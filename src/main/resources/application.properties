# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:todo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# MyBatis
mybatis.mapper-locations=classpath*:*Mapper.xml

# Multipart upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File storage
app.upload.dir=uploads

# Web/Thymeleaf encoding
spring.web.encoding.charset=UTF-8
spring.web.encoding.force=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
logging.charset.console=UTF-8

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourname@gmail.com
spring.mail.password=app-password
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Mail reminder settings
app.mail.from=${spring.mail.username}
app.mail.app-name=Todo App
app.mail.reminder-subject=[Todo] 期限リマインダー
app.mail.reminder-cron=0 0 9 * * *
app.mail.reminder-zone=Asia/Tokyo
app.mail.dry-run=true
