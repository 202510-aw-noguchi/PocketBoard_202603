<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="#{admin.users.list}">ユーザー一覧</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-weak: rgba(37, 99, 235, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 920px; margin: 0 auto; }
    .header {
      position: relative;
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .header .auth { max-width: 45%; }
    .header-title { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 48px; height: 48px; object-fit: contain; }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .auth {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .auth strong { color: var(--text); }
    .auth button {
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .breadcrumbs-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .breadcrumbs {
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }
    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .breadcrumb-sep { color: #9ca3af; }
    .admin-link a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-weak);
      color: var(--accent);
      padding: 6px 10px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 12px;
    }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border: 1px solid var(--border);
      padding: 12px 10px;
      text-align: left;
      font-size: 14px;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }
    tr:last-child td { border-bottom: none; }
    @media (max-width: 750px) {
      .header {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 10px;
      }
      .header .auth {
        position: static;
        justify-content: flex-start;
        max-width: 100%;
      }
      .breadcrumbs-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-title">
        <img class="header-logo" src="/images/animal_hashibirokou_manage.png" alt="icon" />
        <div>
          <h1 th:text="#{admin.users.list}">ユーザー一覧</h1>
          <div class="sub" th:text="#{admin.users.subtitle}">User List</div>
        </div>
      </div>

      <div class="auth" sec:authorize="isAuthenticated()">
        <span><span th:text="#{label.loggedIn}">ログイン中</span>: <strong sec:authentication="name">user</strong></span>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" th:text="#{action.logout}">ログアウト</button>
        </form>
      </div>
    </div>

    <div class="breadcrumbs-row">
      <nav class="breadcrumbs" aria-label="breadcrumb">
        <a th:href="@{/}" th:text="#{action.top}">トップ</a>
        <span class="breadcrumb-sep">/</span>
        <a th:href="@{/admin}" th:text="#{action.adminPage}">管理画面</a>
        <span class="breadcrumb-sep">/</span>
        <span th:text="#{admin.users.list}">ユーザー一覧</span>
      </nav>
      <div class="admin-link">
        <a th:href="@{/admin/users/manage}" th:text="#{action.userManage}">ユーザー管理</a>
      </div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th th:text="#{label.username}">ユーザー名</th>
            <th th:text="#{admin.users.role}">ロール</th>
            <th th:text="#{admin.users.totalTasks}">全タスク数</th>
            <th th:text="#{admin.users.incomplete}">未完了</th>
            <th th:text="#{admin.users.overdue}">期限切れ</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td th:text="${u.id}">1</td>
            <td th:text="${u.username}">admin</td>
            <td th:text="${u.role}">ROLE_ADMIN</td>
            <td th:text="${summaryMap[u.id] != null ? summaryMap[u.id].totalCount : 0}">0</td>
            <td th:text="${summaryMap[u.id] != null ? summaryMap[u.id].incompleteCount : 0}">0</td>
            <td th:text="${summaryMap[u.id] != null ? summaryMap[u.id].overdueCount : 0}">0</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
