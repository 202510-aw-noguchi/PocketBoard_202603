<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="#{action.adminTodos}">全ToDo一覧</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --danger: #b00020;
      --danger-weak: #ffe3e3;
      --warn: #8a6d00;
      --warn-weak: #fff4cc;
      --ok: #1b5e20;
      --ok-weak: #e1f5e1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 1100px; margin: 0 auto; }
    .header {
      position: relative;
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .header-title { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 48px; height: 48px; object-fit: contain; }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .auth {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .auth strong { color: var(--text); }
    .auth button {
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .breadcrumbs {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }
    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .breadcrumb-sep { color: #9ca3af; }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      position: relative;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .filters input, .filters select {
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 5px;
      background: #fff;
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      line-height: 1.4;
      cursor: pointer;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }
    .table th, .table td {
      border: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }
    .table th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }
    .priority-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 12px;
    }
    .priority-high { background: var(--danger-weak); color: var(--danger); }
    .priority-medium { background: var(--warn-weak); color: var(--warn); }
    .priority-low { background: var(--ok-weak); color: var(--ok); }
    .deadline-over { background: #ffe5e5; }
    .deadline-soon { background: #fff4cc; }
    .pagination {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pagination a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal.is-open { display: flex; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); }
    .modal-dialog {
      position: relative;
      background: #fff;
      padding: 16px 20px;
      border-radius: 8px;
      min-width: 280px;
      max-width: 90vw;
    }
    .modal-title { margin: 0 0 8px; font-size: 18px; }
    .modal-actions { margin-top: 12px; display: flex; gap: 8px; justify-content: flex-end; }
    @media (max-width: 750px) {
      .card { overflow-x: auto; }
      .table { min-width: 900px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-title">
        <img class="header-logo" src="/images/animal_hashibirokou_manage.png" alt="アイコン" />
        <div>
          <h1 th:text="#{action.adminTodos}">全ToDo一覧</h1>
          <div class="sub" th:text="#{action.adminTodos}">All Todos</div>
        </div>
      </div>
      <div class="auth" sec:authorize="isAuthenticated()">
        <span><span th:text="#{label.loggedIn}">ログイン中</span>: <strong sec:authentication="name">user</strong></span>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" th:text="#{action.logout}">ログアウト</button>
        </form>
      </div>
    </div>

    <nav class="breadcrumbs" aria-label="breadcrumb">
      <a th:href="@{/}" th:text="#{action.top}">トップ</a>
      <span class="breadcrumb-sep">/</span>
      <a th:href="@{/admin}" th:text="#{action.adminPage}">管理画面</a>
      <span class="breadcrumb-sep">/</span>
      <span th:text="#{action.adminTodos}">全ToDo一覧</span>
    </nav>

    <div class="card">
      <form th:action="@{/admin/todos}" method="get" class="filters">
        <input type="text" name="keyword" th:value="${keyword}" th:placeholder="#{label.keywordPlaceholder}" />
        <select name="categoryId">
          <option value="" th:text="#{label.categoryPlaceholder}">カテゴリ</option>
          <option th:each="c : ${categories}"
                  th:value="${c.id}"
                  th:selected="${c.id} == ${categoryId}"
                  th:text="${c.name}">カテゴリ</option>
        </select>
        <input type="hidden" name="sort" th:value="${sort}" />
        <input type="hidden" name="dir" th:value="${dir}" />
        <input type="hidden" name="includeCompleted" th:value="${includeCompleted}" />
        <button type="submit" class="action-button" th:text="#{action.search}">検索</button>
        <a th:if="${keyword} or ${categoryId}" th:href="@{/admin/todos}" class="action-button" th:text="#{action.clear}">クリア</a>
        <a th:if="${!includeCompleted}" th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, dir=${dir}, includeCompleted=true, page=1)}"
           class="action-button" th:text="#{action.showCompleted}">完了レコードも表示する</a>
        <a th:if="${includeCompleted}" th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, dir=${dir}, includeCompleted=false, page=1)}"
           class="action-button" th:text="#{action.showIncompleteOnly}">未完了のみ表示</a>
      </form>

      <div>
        <p th:text="#{label.totalRange(${totalCount}, ${rangeStart}, ${rangeEnd})}">全0件中 0-0件</p>
      </div>

      <div th:if="${#lists.isEmpty(todos)}">
        <p th:text="#{label.none}">データはありません</p>
      </div>

      <form th:action="@{/delete}" method="post" id="bulk-delete-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="returnTo" value="/admin/todos" />
        <button type="submit" class="action-button" id="bulk-delete-button" th:text="#{action.deleteSelected}">選択した項目を削除</button>

        <table class="table" th:if="${!#lists.isEmpty(todos)}">
          <thead>
          <tr>
            <th><input type="checkbox" id="select-all" /></th>
            <th th:text="#{label.number}">No</th>
            <th>
              <a th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, includeCompleted=${includeCompleted}, sort='title', dir=${sort == 'title' and dir == 'asc' ? 'desc' : 'asc'}, page=1)}">
                <span th:text="#{label.title}">タイトル</span>
              </a>
              <span th:if="${sort == 'title'}" th:text="${dir == 'asc' ? '▲' : '▼'}">▼</span>
            </th>
            <th th:text="#{label.assignee}">担当者</th>
            <th>
              <a th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, includeCompleted=${includeCompleted}, sort='status', dir=${sort == 'status' and dir == 'asc' ? 'desc' : 'asc'}, page=1)}">
                <span th:text="#{label.status}">状態</span>
              </a>
              <span th:if="${sort == 'status'}" th:text="${dir == 'asc' ? '▲' : '▼'}">▼</span>
            </th>
            <th>
              <a th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, includeCompleted=${includeCompleted}, sort='priority', dir=${sort == 'priority' and dir == 'asc' ? 'desc' : 'asc'}, page=1)}">
                <span th:text="#{label.priority}">優先度</span>
              </a>
              <span th:if="${sort == 'priority'}" th:text="${dir == 'asc' ? '▲' : '▼'}">▼</span>
            </th>
            <th>
              <a th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, includeCompleted=${includeCompleted}, sort='deadline', dir=${sort == 'deadline' and dir == 'asc' ? 'desc' : 'asc'}, page=1)}">
                <span th:text="#{label.deadline}">期限</span>
              </a>
              <span th:if="${sort == 'deadline'}" th:text="${dir == 'asc' ? '▲' : '▼'}">▼</span>
            </th>
            <th th:text="#{label.category}">グループ</th>
            <th th:text="#{label.attachment}">添付</th>
            <th th:text="#{action.changeStatus}">状態変更</th>
            <th th:text="#{action.edit}">編集</th>
            <th th:text="#{action.delete}">削除</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="todo, stat : ${todos}"
              th:classappend="${todo.deadline != null and todo.deadline.isBefore(T(java.time.LocalDate).now())} ? 'deadline-over' :
                              (${todo.deadline != null and !todo.deadline.isBefore(T(java.time.LocalDate).now()) and todo.deadline.isBefore(T(java.time.LocalDate).now().plusDays(3))} ? 'deadline-soon' : '')">
            <td><input type="checkbox" name="ids" th:value="${todo.id}" class="row-check" /></td>
            <td th:text="${totalCount - (rangeStart - 1) - stat.index}">1</td>
            <td th:text="${todo.title}">title</td>
            <td th:text="${todo.assignee}">assignee</td>
            <td><span th:text="${todo.status != null ? #messages.msg('status.' + todo.status.name()) : #messages.msg('status.NOT_STARTED')}">未着手</span></td>
            <td>
              <span th:text="${#messages.msg('priority.' + todo.priority.name())}"
                    th:classappend="${todo.priority.name() == 'HIGH'} ? 'priority-badge priority-high' :
                                    (${todo.priority.name() == 'LOW'} ? 'priority-badge priority-low' : 'priority-badge priority-medium')">中</span>
            </td>
            <td th:text="${todo.deadline != null ? #temporals.format(todo.deadline, 'yyyy-MM-dd') : ''}">2026-02-02</td>
            <td>
              <span th:if="${todo.categoryName}"
                    th:text="${todo.categoryName}"
                    th:style="'background:' + ${todo.categoryColor} + '; color:#fff; padding:2px 8px; border-radius: 6px; font-size:12px;'">カテゴリ</span>
              <span th:unless="${todo.categoryName}" th:text="#{label.notSet}">未設定</span>
            </td>
            <td>
              <span th:if="${attachmentsMap != null and attachmentsMap[todo.id] != null}">
                <a th:each="a : ${attachmentsMap[todo.id]}"
                   th:href="@{/attachments/{id}/download(id=${a.id})}"
                   th:text="${a.originalFilename}"
                   style="margin-right:6px;">file</a>
              </span>
              <span th:if="${attachmentsMap == null or attachmentsMap[todo.id] == null}" th:text="#{label.none}">-</span>
            </td>
            <td>
              <button type="submit"
                      class="action-button"
                      th:formaction="@{/{id}/toggle(id=${todo.id}, returnTo='/admin/todos')}"
                      th:text="${todo.status != null and todo.status.name() == 'NOT_STARTED'} ? #{action.toInProgress} :
                               (${todo.status != null and todo.status.name() == 'IN_PROGRESS'} ? #{action.toCompleted} : #{action.toNotStarted})">状態変更</button>
            </td>
            <td><a th:href="@{/revision/{id}(id=${todo.id})}" class="action-button" th:text="#{action.edit}">編集</a></td>
            <td>
              <button type="button" class="action-button delete-button"
                      th:data-action="@{/delete/{id}(id=${todo.id}, returnTo='/admin/todos')}">
                <span th:text="#{action.delete}">削除</span>
              </button>
            </td>
          </tr>
          </tbody>
        </table>
      </form>

      <div class="pagination">
        <a th:if="${page > 1}"
           th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, includeCompleted=${includeCompleted}, sort=${sort}, dir=${dir}, page=${page - 1})}" th:text="#{action.prev}">前へ</a>
        <span th:if="${page <= 1}" th:text="#{action.prev}">前へ</span>

        <span th:each="p : ${#numbers.sequence(1, totalPages)}">
          <a th:if="${p != page}"
             th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, includeCompleted=${includeCompleted}, sort=${sort}, dir=${dir}, page=${p})}"
             th:text="${p}">1</a>
          <strong th:if="${p == page}" th:text="${p}">1</strong>
        </span>

        <a th:if="${page < totalPages}"
           th:href="@{/admin/todos(keyword=${keyword}, categoryId=${categoryId}, includeCompleted=${includeCompleted}, sort=${sort}, dir=${dir}, page=${page + 1})}" th:text="#{action.next}">次へ</a>
        <span th:if="${page >= totalPages}" th:text="#{action.next}">次へ</span>
      </div>
    </div>

    <div id="delete-modal" class="modal" aria-hidden="true"
         th:attr="data-title=#{modal.deleteTitle},data-message=#{modal.deleteMessage}">
      <div class="modal-backdrop"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
        <h2 id="delete-modal-title" class="modal-title" th:text="#{modal.deleteTitle}">削除確認</h2>
        <p th:text="#{modal.deleteMessage}">本当に削除しますか？</p>
        <div class="modal-actions">
          <button type="button" id="delete-ok" th:text="#{action.ok}">OK</button>
          <button type="button" id="delete-cancel" th:text="#{action.cancel}">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var modal = document.getElementById('delete-modal');
      var ok = document.getElementById('delete-ok');
      var cancel = document.getElementById('delete-cancel');
      var targetAction = null;
      var skipBulkCheck = false;

      var selectAll = document.getElementById('select-all');
      var rowChecks = document.querySelectorAll('.row-check');
      var bulkForm = document.getElementById('bulk-delete-form');

      function openModal(action) {
        targetAction = action;
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
      }

      function closeModal() {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        targetAction = null;
      }

      document.querySelectorAll('.delete-button').forEach(function (button) {
        button.addEventListener('click', function () {
          openModal(button.getAttribute('data-action'));
        });
      });

      ok.addEventListener('click', function () {
        if (targetAction) {
          bulkForm.setAttribute('action', targetAction);
          skipBulkCheck = true;
          bulkForm.submit();
        }
        closeModal();
      });

      cancel.addEventListener('click', closeModal);
      modal.querySelector('.modal-backdrop').addEventListener('click', closeModal);

      if (selectAll) {
        selectAll.addEventListener('change', function () {
          rowChecks.forEach(function (cb) { cb.checked = selectAll.checked; });
        });
      }

      if (bulkForm) {
        bulkForm.addEventListener('submit', function (e) {
          if (skipBulkCheck) {
            skipBulkCheck = false;
            return;
          }
          var anyChecked = false;
          rowChecks.forEach(function (cb) { if (cb.checked) { anyChecked = true; } });
          if (!anyChecked) {
            e.preventDefault();
          }
        });
      }
    })();
  </script>
</body>
</html>
