<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="#{app.completeTitle}">完了</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 920px; margin: 0 auto; }
    .header {
      position: relative;
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .header .auth { max-width: 45%; }
    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .auth {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .auth strong { color: var(--text); }
    .auth button {
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .complete-table {
      border-collapse: collapse;
      width: 100%;
    }
    .complete-table th, .complete-table td {
      border: 1px solid var(--border);
      padding: 12px 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    .complete-table th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
      width: 160px;
    }
    .footer {
      margin-top: 14px;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 1025px) {
      .header { padding: 16px 18px; }
      .header-title { gap: 10px; }
      .header-logo { width: 40px; height: 40px; }
      h1 { font-size: 22px; }
      .header .auth { max-width: 50%; }
    }

    @media (max-width: 750px) {
      .header {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 10px;
      }
      .header .auth {
        position: static;
        justify-content: flex-start;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-title">
        <img class="header-logo" src="/images/animal_hashibirokou.png" alt="アイコン" />
        <div>
          <h1 th:text="#{app.completeTitle}">完了</h1>
          <div class="sub" th:text="#{message.complete}">登録が完了しました</div>
        </div>
      </div>
      <div class="auth" sec:authorize="isAuthenticated()">
        <span>ログイン中: <strong sec:authentication="name">user</strong></span>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" th:text="#{action.logout}">ログアウト</button>
        </form>
      </div>
    </div>

    <div class="card">
      <table class="complete-table">
        <tbody>
          <tr>
            <th th:text="#{label.author}">登録者</th>
            <td th:text="${todoForm.author}">author</td>
          </tr>
          <tr>
            <th th:text="#{label.assignee}">担当者</th>
            <td th:text="${todoForm.assignee}">assignee</td>
          </tr>
          <tr>
            <th th:text="#{label.title}">タイトル</th>
            <td th:text="${todoForm.title}">title</td>
          </tr>
          <tr>
            <th th:text="#{label.detail}">詳細</th>
            <td th:text="${todoForm.detail}">detail</td>
          </tr>
          <tr>
            <th th:text="#{label.priority}">優先度</th>
            <td th:text="${#messages.msg('priority.' + todoForm.priority.name())}">中</td>
          </tr>
          <tr>
            <th th:text="#{label.status}">状態</th>
            <td th:text="${todoForm.status != null ? #messages.msg('status.' + todoForm.status.name()) : #messages.msg('status.NOT_STARTED')}">未着手</td>
          </tr>
          <tr>
            <th th:text="#{label.category}">カテゴリ</th>
            <td th:text="${todoForm.categoryName}">未選択</td>
          </tr>
          <tr>
            <th th:text="#{label.start}">開始</th>
            <td th:text="${todoForm.startDate != null ? #temporals.format(todoForm.startDate, 'yyyy-MM-dd') : ''}">2026-02-02</td>
          </tr>
          <tr>
            <th th:text="#{label.deadline}">期限</th>
            <td th:text="${todoForm.deadline != null ? #temporals.format(todoForm.deadline, 'yyyy-MM-dd') : ''}">2026-02-02</td>
          </tr>
          <tr>
            <th th:text="#{label.attachment}">添付ファイル</th>
            <td>
              <div th:if="${attachments != null and !#lists.isEmpty(attachments)}">
                <ul>
                  <li th:each="a : ${attachments}">
                    <a th:href="@{/attachments/{id}/download(id=${a.id})}"
                       th:text="${a.originalFilename}">file</a>
                  </li>
                </ul>
              </div>
              <span th:if="${attachments == null or #lists.isEmpty(attachments)}" th:text="#{label.none}">none</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="footer">
      <a th:href="@{/}">一覧へ戻る</a>
    </div>
  </div>
</body>
</html>
