<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>パスワード再発行</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 520px; margin: 0 auto; }
    .header {
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 24px; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    label { font-size: 13px; color: var(--muted); }
    input[type="text"], input[type="email"] {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      width: 100%;
      background: #fff;
    }
    button {
      margin-top: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      padding: 9px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    .message.error { background: #ffe5e5; border-color: #f0b4b4; }
    .message.info { background: #eef2ff; border-color: #c7d2fe; }
    .actions {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
    }
    .actions a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>パスワード再発行</h1>
      <div class="sub">登録済みのユーザー名とメールアドレスを入力してください。</div>
    </div>
    <div class="card">
      <div class="message error" th:if="${error}" th:text="${error}">エラー</div>
      <div class="message info" th:if="${message}" th:text="${message}">完了</div>
      <form th:action="@{/password/reissue}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label>
          ユーザー名
          <input type="text" name="username" autocomplete="username" required />
        </label>
        <label>
          メールアドレス
          <input type="email" name="email" autocomplete="email" required />
        </label>
        <button type="submit">再発行メールを送信</button>
      </form>
      <div class="actions">
        <a th:href="@{/login}">ログイン画面へ戻る</a>
      </div>
    </div>
  </div>
</body>
</html>
