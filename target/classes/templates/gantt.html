<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <title th:text="#{gantt.title}">リソースレベリング</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-weak: rgba(37, 99, 235, 0.08);
      --bar: #9bbcff;
      --bar-done: #d1d5db;
      --danger: #b00020;
      --danger-weak: #ffe3e3;
      --warn: #8a6d00;
      --warn-weak: #fff4cc;
      --ok: #1b5e20;
      --ok-weak: #e1f5e1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 1200px; margin: 0 auto; }
    .header {
      position: relative;
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .header .auth {
      max-width: 45%;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .auth {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .auth strong { color: var(--text); }
    .auth button {
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls input[type="month"] {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 8px;
      background: #fff;
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      line-height: 1.4;
      cursor: pointer;
    }
    .matrix {
      margin-top: 12px;
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      position: relative;
    }
    #matrix {
      margin-bottom: 3em;
    }
    .matrix table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
    }
    .matrix th, .matrix td {
      border: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 8px 10px;
      text-align: center;
      font-size: 12px;
      white-space: nowrap;
    }
    .matrix th {
      background: #f8fafc;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 11px;
      position: sticky;
      top: 0;
      z-index: 2;
      white-space: nowrap;
    }
    .matrix th.today,
    .matrix td.today {
      background: #ffecec;
    }
    .matrix th.sortable {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .matrix th.sortable .sort-mark {
      margin-left: 6px;
      font-size: 10px;
      line-height: 1;
      flex: 0 0 auto;
    }
    .matrix th.sticky,
    .matrix td.sticky {
      position: sticky;
      left: 0;
      background: #fff;
      text-align: left;
      min-width: 70px;
      z-index: 3;
    }
    .matrix th.sticky-2,
    .matrix td.sticky-2 {
      position: sticky;
      left: 70px;
      background: #fff;
      min-width: 140px;
      z-index: 3;
    }
    .matrix th.sticky-3,
    .matrix td.sticky-3 {
      position: sticky;
      left: 210px;
      background: #fff;
      min-width: 70px;
      z-index: 3;
    }
    .matrix th.sticky-4,
    .matrix td.sticky-4 {
      position: sticky;
      left: 280px;
      background: #fff;
      min-width: 60px;
      z-index: 3;
    }
    .matrix th.sticky-5,
    .matrix td.sticky-5 {
      position: sticky;
      left: 340px;
      background: #fff;
      min-width: 60px;
      z-index: 3;
    }
    .matrix th.sticky,
    .matrix th.sticky-2,
    .matrix th.sticky-3,
    .matrix th.sticky-4,
    .matrix th.sticky-5 {
      background: #f8fafc;
      z-index: 4;
    }
    .bar {
      display: block;
      height: 10px;
      border-radius: 10px;
      background: var(--bar);
      margin: 0 auto;
      width: 100%;
    }
    .bar.done { background: var(--bar-done); }
    .bar.overdue { background: #e4553f; }
    .row-done {
      color: var(--muted);
      background: #f3f4f6;
    }
    .summary-title {
      margin: 1em 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    .footer { margin-top: 14px; }
    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .group-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 12px;
      color: #fff;
      background: #64748b;
    }
    .priority-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 12px;
    }
    .priority-high { background: var(--danger-weak); color: var(--danger); }
    .priority-medium { background: var(--warn-weak); color: var(--warn); }
    .priority-low { background: var(--ok-weak); color: var(--ok); }
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .warning-skull {
      font-size: 14px;
      color: #b00020;
      display: block;
      margin-top: 2px;
      line-height: 1;
      transform: scale(1.5);
      transform-origin: center top;
    }
    .warning-skull.placeholder {
      visibility: hidden;
    }
    .daily-total-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 30px;
      line-height: 1.1;
    }
    .daily-total-value {
      display: block;
    }

    @media (max-width: 1025px) {
      .header {
        padding: 16px 18px;
      }
      .header-title {
        gap: 10px;
      }
      .header-logo {
        width: 40px;
        height: 40px;
      }
      h1 { font-size: 22px; }
      .header .auth { max-width: 50%; }
      .page { max-width: 100%; }
      .card { overflow-x: auto; }
      .matrix table { min-width: 1000px; }
    }

    @media (max-width: 750px) {
      .header {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 10px;
      }
      .header .auth {
        position: static;
        justify-content: flex-start;
        max-width: 100%;
      }
      .controls { flex-wrap: wrap; }
      .card { overflow-x: auto; }
      .matrix table { min-width: 900px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-title">
        <img class="header-logo" src="/images/animal_hashibirokou.png" alt="アイコン" />
        <div>
          <h1 th:text="#{gantt.title}">リソースレベリング</h1>
          <div class="sub" th:text="#{gantt.subtitle}">Resource Leveling</div>
        </div>
      </div>
      <div class="auth" sec:authorize="isAuthenticated()">
        <span th:text="#{label.loggedIn} + ': '">ログイン中: </span><strong sec:authentication="name">user</strong>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" th:text="#{action.logout}">ログアウト</button>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="controls">
        <button class="action-button" id="prev-month" th:text="#{action.prevMonth}">前月</button>
        <input type="month" id="month-picker" />
        <button class="action-button" id="next-month" th:text="#{action.nextMonth}">次月</button>
        <button class="action-button" id="toggle-completed" style="margin-left:3em;"
                th:text="#{action.showCompleted}"
                th:attr="data-show-completed=#{action.showCompleted},data-show-incomplete=#{action.showIncompleteOnly}">
          完了も表示
        </button>
      </div>

      <div class="matrix" id="matrix"
           th:attr="data-label-group=#{label.category},data-label-title=#{label.title},data-label-assignee=#{label.assignee},data-label-status=#{label.status},data-label-priority=#{label.priority},data-priority-high=#{priority.HIGH},data-priority-medium=#{priority.MEDIUM},data-priority-low=#{priority.LOW},data-status-not-started=#{status.NOT_STARTED},data-status-in-progress=#{status.IN_PROGRESS},data-status-completed=#{status.COMPLETED}">
      </div>

      <div class="summary-title" th:text="#{gantt.summaryTitle}">担当者別タスク</div>
      <div class="matrix summary" id="summary"
           th:attr="data-user-label=#{label.username},data-total-label=#{label.total}"></div>
    </div>

    <div class="footer">
      <a th:href="@{/}" th:text="#{action.backToList}">一覧へ戻る</a>
    </div>
  </div>

  <script>
    const monthPicker = document.getElementById("month-picker");
    const prevBtn = document.getElementById("prev-month");
    const nextBtn = document.getElementById("next-month");
    const toggleCompletedBtn = document.getElementById("toggle-completed");
    const matrixEl = document.getElementById("matrix");
    const summaryEl = document.getElementById("summary");

    const now = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    let currentSort = { key: null, dir: 1 };
    let showCompleted = false;

    const getMonthRange = (value) => {
      const [y, m] = value.split("-").map(Number);
      const start = new Date(y, m - 1, 1);
      const end = new Date(y, m, 0);
      return {
        start: `${start.getFullYear()}-${pad(start.getMonth() + 1)}-${pad(start.getDate())}`,
        end: `${end.getFullYear()}-${pad(end.getMonth() + 1)}-${pad(end.getDate())}`
      };
    };

    const shiftMonth = (offset) => {
      const [y, m] = monthPicker.value.split("-").map(Number);
      const date = new Date(y, m - 1 + offset, 1);
      monthPicker.value = `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
      load();
    };

    const sortTasks = (tasks) => {
      if (!currentSort.key) return tasks.slice();
      const key = currentSort.key;
      const dir = currentSort.dir;
      return tasks.slice().sort((a, b) => {
        const av = (a[key] || "").toString().toLowerCase();
        const bv = (b[key] || "").toString().toLowerCase();
        if (av < bv) return -1 * dir;
        if (av > bv) return 1 * dir;
        return 0;
      });
    };

    const priorityClass = (priority) => {
      if (priority === "HIGH") return "priority-badge priority-high";
      if (priority === "LOW") return "priority-badge priority-low";
      return "priority-badge priority-medium";
    };
    const priorityLabel = (priority) => {
      if (priority === "HIGH") return matrixEl.dataset.priorityHigh || "High";
      if (priority === "LOW") return matrixEl.dataset.priorityLow || "Low";
      return matrixEl.dataset.priorityMedium || "Medium";
    };

    const buildMatrix = (tasks, range) => {
      const start = new Date(range.start);
      const end = new Date(range.end);
      const days = [];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        days.push(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`);
      }
      const todayStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;

      const sorted = sortTasks(tasks);
      const sortMark = (key) => currentSort.key === key ? (currentSort.dir === 1 ? "▲" : "▼") : "";

      const labelGroup = matrixEl.dataset.labelGroup || "グループ";
      const labelTitle = matrixEl.dataset.labelTitle || "タイトル";
      const labelAssignee = matrixEl.dataset.labelAssignee || "担当者";
      const labelStatus = matrixEl.dataset.labelStatus || "状態";
      const labelPriority = matrixEl.dataset.labelPriority || "優先度";
      const groupMark = sortMark("groupName");
      const assigneeMark = sortMark("assignee");
      const groupHeader = groupMark ? `${labelGroup}<span class="sort-mark">${groupMark}</span>` : labelGroup;
      const assigneeHeader = assigneeMark ? `${labelAssignee}<span class="sort-mark">${assigneeMark}</span>` : labelAssignee;

      const header = `
        <table>
          <thead>
            <tr>
              <th class="sticky sortable" data-sort="groupName">${groupHeader}</th>
              <th class="sticky-2">${labelTitle}</th>
              <th class="sticky-3 sortable" data-sort="assignee">${assigneeHeader}</th>
              <th class="sticky-4">${labelStatus}</th>
              <th class="sticky-5">${labelPriority}</th>
              ${days.map((d) => `<th class="${d === todayStr ? "today" : ""}">${d.slice(5)}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${sorted.map((t) => {
              const taskStart = new Date(t.originalStart || t.start);
              const taskEnd = new Date(t.originalEnd || t.end);
              const isDone = t.status === "COMPLETED";
              const isOverdue = !isDone && t.originalEnd && t.originalEnd < todayStr;

              const cells = [];
              let i = 0;
              while (i < days.length) {
                const d = new Date(days[i]);
                const on = d >= taskStart && d <= taskEnd;
                if (!on) {
                  const isToday = days[i] === todayStr ? "today" : "";
                  cells.push(`<td class="${isToday}"></td>`);
                  i += 1;
                  continue;
                }
                let j = i + 1;
                while (j < days.length) {
                  const dj = new Date(days[j]);
                  if (dj < taskStart || dj > taskEnd) {
                    break;
                  }
                  j += 1;
                }
                const span = j - i;
                let todayStyle = "";
                const todayIndex = days.indexOf(todayStr);
                if (todayIndex >= i && todayIndex < j) {
                  const startPct = ((todayIndex - i) / span) * 100;
                  const endPct = ((todayIndex - i + 1) / span) * 100;
                  todayStyle = `style="background: linear-gradient(90deg, transparent 0%, transparent ${startPct}%, #ffecec ${startPct}%, #ffecec ${endPct}%, transparent ${endPct}%, transparent 100%);"`;
                }
                cells.push(
                  `<td colspan="${span}" ${todayStyle}><span class="bar ${isDone ? "done" : (isOverdue ? "overdue" : "")}"></span></td>`
                );
                i = j;
              }

              const groupStyle = t.groupColor ? `style="background:${t.groupColor};"` : "";
              const statusLabel = t.status === "COMPLETED"
                ? (matrixEl.dataset.statusCompleted || "Completed")
                : (t.status === "IN_PROGRESS"
                  ? (matrixEl.dataset.statusInProgress || "In Progress")
                  : (matrixEl.dataset.statusNotStarted || "Not Started"));
              return `
                <tr class="${isDone ? "row-done" : ""}">
                  <td class="sticky"><span class="group-badge" ${groupStyle}>${t.groupName || "-"}</span></td>
                  <td class="sticky-2">${t.title || "-"}</td>
                  <td class="sticky-3">${t.assignee || "-"}</td>
                  <td class="sticky-4">${statusLabel}</td>
                  <td class="sticky-5"><span class="${priorityClass(t.priority)}">${priorityLabel(t.priority)}</span></td>
                  ${cells.join("")}
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
      matrixEl.innerHTML = header;

      matrixEl.querySelectorAll("th.sortable").forEach((th) => {
        th.addEventListener("click", () => {
          const key = th.getAttribute("data-sort");
          if (currentSort.key === key) {
            currentSort.dir = currentSort.dir * -1;
          } else {
            currentSort.key = key;
            currentSort.dir = 1;
          }
          buildMatrix(tasks, range);
        });
      });
    };

    const buildSummary = (tasks, range) => {
      const start = new Date(range.start);
      const end = new Date(range.end);
      const days = [];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        days.push(`${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`);
      }
      const todayStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;

      const map = {};
      tasks.forEach((t) => {
        const name = t.assignee || "-";
        if (!map[name]) {
          map[name] = {};
        }
        const taskStart = new Date(t.originalStart || t.start);
        const taskEnd = new Date(t.originalEnd || t.end);
        days.forEach((day) => {
          const d = new Date(day);
          if (d >= taskStart && d <= taskEnd) {
            const entry = map[name][day] || { total: 0, open: 0 };
            entry.total += 1;
            if (t.status !== "COMPLETED") {
              entry.open += 1;
            }
            map[name][day] = entry;
          }
        });
      });

      const header = `
        <table>
          <thead>
            <tr>
              <th class="sticky">${summaryEl.dataset.userLabel || "User"}</th>
              ${days.map((d) => `<th class="${d === todayStr ? "today" : ""}">${d.slice(5)}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${Object.keys(map).sort().map((name) => `
              <tr>
                <td class="sticky">${name}</td>
                ${days.map((d) => {
                  const entry = map[name][d];
                  const todayClass = d === todayStr ? "today" : "";
                  if (!entry) return `<td class="${todayClass}"></td>`;
                  return `<td class="${todayClass}">${entry.open} / ${entry.total}</td>`;
                }).join("")}
              </tr>
            `).join("")}
            <tr>
              <td class="sticky">${summaryEl.dataset.totalLabel || "Total"}</td>
              ${days.map((d) => {
                let total = 0;
                Object.keys(map).forEach((name) => {
                  const entry = map[name][d];
                  if (entry) {
                    total += entry.total;
                  }
                });
                const todayClass = d === todayStr ? "today" : "";
                if (total <= 0) {
                  return `<td class="${todayClass}"></td>`;
                }
                const skull = total >= 5
                  ? `<span class="material-symbols-outlined warning-skull" title="負荷高">warning</span>`
                  : `<span class="material-symbols-outlined warning-skull placeholder">warning</span>`;
                return `<td class="${todayClass}"><div class="daily-total-cell"><span class="daily-total-value">${total}</span>${skull}</div></td>`;
              }).join("")}
            </tr>
          </tbody>
        </table>
      `;
      summaryEl.innerHTML = header;
    };

    const load = () => {
      const range = getMonthRange(monthPicker.value);
      fetch(`/gantt/data?start=${range.start}&end=${range.end}`)
        .then((res) => res.json())
        .then((tasks) => {
          if (!tasks || tasks.length === 0) {
            matrixEl.innerHTML = "";
            summaryEl.innerHTML = "";
            return;
          }
          const filtered = showCompleted ? tasks : tasks.filter((t) => t.status !== "COMPLETED");
          buildMatrix(filtered, range);
          buildSummary(filtered, range);
        })
        .catch(() => {
          matrixEl.innerHTML = "";
          summaryEl.innerHTML = "";
        });
    };

    monthPicker.value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}`;
    prevBtn.addEventListener("click", () => shiftMonth(-1));
    nextBtn.addEventListener("click", () => shiftMonth(1));
    monthPicker.addEventListener("change", load);
    if (toggleCompletedBtn) {
      toggleCompletedBtn.addEventListener("click", () => {
        showCompleted = !showCompleted;
        toggleCompletedBtn.textContent = showCompleted
          ? (toggleCompletedBtn.dataset.showIncomplete || "Show Incomplete Only")
          : (toggleCompletedBtn.dataset.showCompleted || "Show Completed");
        load();
      });
    }
    load();
  </script>
</body>
</html>
