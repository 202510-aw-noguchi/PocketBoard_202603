<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="#{admin.users.manageTitle}">ユーザー管理</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --danger: #ef4444;
      --success: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 980px; margin: 0 auto; }
    .header {
      position: relative;
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .header .auth { max-width: 45%; }
    .header-title { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 48px; height: 48px; object-fit: contain; }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .auth {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .auth strong { color: var(--text); }
    .auth button {
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .breadcrumbs {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }
    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .breadcrumb-sep { color: #9ca3af; }
    .alert {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .alert.success {
      background: rgba(16, 185, 129, 0.12);
      color: #0f766e;
      border: 1px solid rgba(16, 185, 129, 0.25);
    }
    .alert.error {
      background: rgba(239, 68, 68, 0.12);
      color: #b91c1c;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .card h2 { margin: 0 0 12px; font-size: 16px; color: var(--text); }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 160px 120px;
      gap: 12px;
      align-items: end;
    }
    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 14px;
      background: #fff;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button.ghost {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.danger {
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .warn {
      background: #f59e0b;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border: 1px solid var(--border);
      padding: 12px 10px;
      text-align: left;
      font-size: 14px;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }
    .actions { display: flex; gap: 8px; align-items: center; }
    .status-chip {
      display: inline-block;
      font-size: 11px;
      color: #b45309;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 10px;
      padding: 3px 8px;
      margin-left: 8px;
    }
    @media (max-width: 1025px) {
      .header { padding: 16px 18px; }
      .header-title { gap: 10px; }
      .header-logo { width: 40px; height: 40px; }
      h1 { font-size: 22px; }
      .header .auth { max-width: 50%; }
      .form-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 750px) {
      .header { display: grid; grid-template-columns: 1fr; row-gap: 10px; }
      .header .auth { position: static; justify-content: flex-start; max-width: 100%; }
      .form-row { grid-template-columns: 1fr; }
      .card { overflow-x: auto; }
      table { min-width: 720px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-title">
        <img class="header-logo" src="/images/animal_hashibirokou_manage.png" alt="icon" />
        <div>
          <h1 th:text="#{admin.users.manageTitle}">ユーザー管理</h1>
          <div class="sub" th:text="#{admin.users.manageSubtitle}">User Management</div>
        </div>
      </div>
      <div class="auth" sec:authorize="isAuthenticated()">
        <span><span th:text="#{label.loggedIn}">ログイン中</span>: <strong sec:authentication="name">user</strong></span>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" th:text="#{action.logout}">ログアウト</button>
        </form>
      </div>
    </div>

    <nav class="breadcrumbs" aria-label="breadcrumb">
      <a th:href="@{/}" th:text="#{action.top}">トップ</a>
      <span class="breadcrumb-sep">/</span>
      <a th:href="@{/admin}" th:text="#{action.adminPage}">管理画面</a>
      <span class="breadcrumb-sep">/</span>
      <a th:href="@{/admin/users}" th:text="#{admin.users.list}">ユーザー一覧</a>
      <span class="breadcrumb-sep">/</span>
      <span th:text="#{admin.users.manageTitle}">ユーザー管理</span>
    </nav>

    <div class="alert success" th:if="${message}" th:text="${message}">success</div>
    <div class="alert error" th:if="${error}" th:text="${error}">error</div>

    <div class="card">
      <h2 th:text="#{admin.users.create}">新規ユーザー登録</h2>
      <div class="sub" th:text="#{admin.users.createHelp}">ユーザー名は8文字以上、パスワードは8文字以上で設定してください。</div>
      <form th:action="@{/admin/users/manage/create}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-row">
          <div>
            <label th:text="#{label.username}">ユーザー名</label>
            <input type="text" name="username" required />
          </div>
          <div>
            <label th:text="#{label.password}">パスワード</label>
            <input type="password" name="password" required />
          </div>
          <div>
            <label th:text="#{admin.users.email}">メールアドレス</label>
            <input type="email" name="email" placeholder="example@example.com" />
          </div>
          <div>
            <label th:text="#{admin.users.role}">権限</label>
            <select name="role">
              <option value="ROLE_USER">ROLE_USER</option>
              <option value="ROLE_ADMIN">ROLE_ADMIN</option>
            </select>
          </div>
          <div>
            <button class="primary" type="submit" th:text="#{action.add}">追加</button>
          </div>
        </div>
      </form>
    </div>

    <div class="card">
      <h2 th:text="#{admin.users.existing}">既存ユーザー管理</h2>
      <div class="sub" th:text="#{admin.users.existingHelp}">タスクが紐づいているユーザーは削除できません。</div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th th:text="#{label.username}">ユーザー名</th>
            <th th:text="#{admin.users.email}">メールアドレス</th>
            <th th:text="#{admin.users.role}">権限</th>
            <th th:text="#{admin.users.reset}">再発行</th>
            <th th:text="#{action.delete}">削除</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users}">
            <td th:text="${u.id}">1</td>
            <td>
              <span th:text="${u.username}">admin</span>
              <span class="status-chip" th:if="${u.passwordResetRequired}" th:text="#{admin.users.resetPending}">再設定待ち</span>
            </td>
            <td>
              <form th:action="@{/admin/users/manage/role}" method="post" class="actions">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="userId" th:value="${u.id}" />
                <input type="hidden" name="role" th:value="${u.role}" />
                <input type="email" name="email" th:value="${u.email}" placeholder="example@example.com" />
                <button class="ghost" type="submit" th:text="#{action.update}">更新</button>
              </form>
            </td>
            <td>
              <form th:action="@{/admin/users/manage/role}" method="post" class="actions">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="userId" th:value="${u.id}" />
                <select name="role">
                  <option value="ROLE_USER" th:selected="${u.role == 'ROLE_USER'}">ROLE_USER</option>
                  <option value="ROLE_ADMIN" th:selected="${u.role == 'ROLE_ADMIN'}">ROLE_ADMIN</option>
                </select>
                <button class="ghost" type="submit" th:text="#{action.update}">更新</button>
              </form>
            </td>
            <td>
              <form th:action="@{/admin/users/manage/reset-password}" method="post"
                    th:attr="onsubmit=|return confirm('${#messages.msg('admin.users.reissueConfirm')}');|">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="userId" th:value="${u.id}" />
                <button class="warn" type="submit" th:text="#{action.reissue}">再発行</button>
              </form>
            </td>
            <td>
              <form th:action="@{/admin/users/manage/delete}" method="post"
                    th:attr="onsubmit=|return confirm('${#messages.msg('admin.users.deleteConfirm')}');|">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="userId" th:value="${u.id}" />
                <button class="danger" type="submit" th:text="#{action.delete}">削除</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
