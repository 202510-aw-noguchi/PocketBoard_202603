<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="#{admin.audit.title}">監査ログ</title>
  <style>
    :root { --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb; }
    *{box-sizing:border-box;}
    body{margin:0;padding:24px;background:var(--bg);color:var(--text);font-family:"Segoe UI","Noto Sans JP",system-ui,-apple-system,sans-serif;}
    .page{max-width:1300px;margin:0 auto;}
    .header{position:relative;padding:20px 24px;border-bottom:1px solid var(--border);}
    .header-title{display:flex;align-items:center;gap:12px;}
    .header-logo{width:48px;height:48px;object-fit:contain;}
    h1{margin:0;font-size:24px;}
    .sub{margin-top:4px;color:var(--muted);font-size:13px;}
    .auth{position:absolute;top:18px;right:24px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
    .auth button{border:1px solid var(--border);background:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;}
    .breadcrumbs{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
    .breadcrumbs a{color:var(--accent);text-decoration:none;font-weight:600;}
    .card{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;}
    .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
    .filters input{border:1px solid var(--border);border-radius:5px;padding:7px 9px;background:#fff;}
    .filters button,.filters a{border:1px solid var(--border);border-radius:5px;padding:7px 11px;background:#fff;text-decoration:none;color:var(--text);font-size:13px;cursor:pointer;}
    table{width:100%;border-collapse:collapse;margin-top:6px;}
    th,td{border:1px solid var(--border);padding:8px 9px;text-align:left;font-size:12px;vertical-align:top;}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
    .mono{font-family:Consolas,"Courier New",monospace;white-space:pre-wrap;word-break:break-word;}
    .pagination{margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:13px;}
    .pagination a{color:var(--accent);text-decoration:none;font-weight:600;}
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-title">
        <img class="header-logo" src="/images/animal_hashibirokou_manage.png" alt="icon" />
        <div>
          <h1 th:text="#{admin.audit.title}">監査ログ</h1>
          <div class="sub" th:text="#{admin.audit.subtitle}">Audit Logs</div>
        </div>
      </div>
      <div class="auth" sec:authorize="isAuthenticated()">
        <span><span th:text="#{label.loggedIn}">ログイン中</span>: <strong sec:authentication="name">user</strong></span>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" th:text="#{action.logout}">ログアウト</button>
        </form>
      </div>
    </div>

    <nav class="breadcrumbs" aria-label="breadcrumb">
      <a th:href="@{/}" th:text="#{action.top}">トップ</a>
      <span>/</span>
      <a th:href="@{/admin}" th:text="#{action.adminPage}">管理画面</a>
      <span>/</span>
      <span th:text="#{admin.audit.title}">監査ログ</span>
    </nav>

    <div class="card">
      <form class="filters" th:action="@{/admin/audit-logs}" method="get">
        <input type="text" name="action" th:value="${action}" placeholder="action" />
        <input type="text" name="entityType" th:value="${entityType}" placeholder="entity_type" />
        <input type="number" name="userId" th:value="${userId}" placeholder="user_id" />
        <button type="submit" th:text="#{action.search}">検索</button>
        <a th:href="@{/admin/audit-logs}" th:text="#{action.clear}">クリア</a>
      </form>

      <div th:text="#{admin.audit.total(${totalCount})}">合計 0 件</div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th th:text="#{admin.audit.datetime}">日時</th>
            <th>action</th>
            <th>entity_type</th>
            <th>entity_id</th>
            <th>user</th>
            <th>ip_address</th>
            <th>old_value(JSON)</th>
            <th>new_value(JSON)</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(logs)}">
            <td colspan="9" th:text="#{admin.audit.noData}">データはありません。</td>
          </tr>
          <tr th:each="log : ${logs}">
            <td th:text="${log.id}">1</td>
            <td th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2026-02-18 12:00:00</td>
            <td th:text="${log.action}">UPDATE</td>
            <td th:text="${log.entityType}">Todo</td>
            <td th:text="${log.entityId}">10</td>
            <td th:text="${log.userId != null and userNameMap[log.userId] != null ? userNameMap[log.userId] : log.userId}">admin</td>
            <td th:text="${log.ipAddress}">127.0.0.1</td>
            <td class="mono" th:text="${log.oldValue}">{"x":"y"}</td>
            <td class="mono" th:text="${log.newValue}">{"x":"z"}</td>
          </tr>
        </tbody>
      </table>

      <div class="pagination">
        <a th:if="${page > 1}" th:href="@{/admin/audit-logs(action=${action}, entityType=${entityType}, userId=${userId}, page=${page - 1})}" th:text="#{action.prev}">前へ</a>
        <span th:if="${page <= 1}" th:text="#{action.prev}">前へ</span>
        <span th:text="${page} + ' / ' + ${totalPages}">1 / 1</span>
        <a th:if="${page < totalPages}" th:href="@{/admin/audit-logs(action=${action}, entityType=${entityType}, userId=${userId}, page=${page + 1})}" th:text="#{action.next}">次へ</a>
        <span th:if="${page >= totalPages}" th:text="#{action.next}">次へ</span>
      </div>
    </div>
  </div>
</body>
</html>
