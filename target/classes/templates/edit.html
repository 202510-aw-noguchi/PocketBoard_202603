<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${todoForm != null and todoForm.id != null} ? #{action.edit} : #{action.new}">新規登録</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-weak: rgba(37, 99, 235, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 920px; margin: 0 auto; }
    .header {
      position: relative;
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    .header .auth { max-width: 45%; }
    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .auth {
      position: absolute;
      top: 18px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .auth strong { color: var(--text); }
    .auth button {
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 10px;
      border-radius: 10px;
      cursor: pointer;
    }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid var(--border); padding: 12px 10px; text-align: left; font-size: 14px; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; }
    tr:last-child td { border-bottom: none; }
    input[type="text"], input[type="date"], select, textarea {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 8px;
      width: 100%;
      max-width: 520px;
      background: #fff;
      transition: border-color .15s ease;
    }
    input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      outline: none;
    }
    textarea { min-height: 90px; }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      line-height: 1.4;
      cursor: pointer;
    }
    .action-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .required {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      border-radius: 10px;
      background: var(--accent-weak);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      vertical-align: middle;
    }

    @media (max-width: 1025px) {
      .header { padding: 16px 18px; }
      .header-title { gap: 10px; }
      .header-logo { width: 40px; height: 40px; }
      h1 { font-size: 22px; }
      .header .auth { max-width: 50%; }
    }

    @media (max-width: 750px) {
      .header {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 10px;
      }
      .header .auth {
        position: static;
        justify-content: flex-start;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="header-title">
        <img class="header-logo" src="/images/animal_hashibirokou.png" alt="アイコン" />
        <div>
          <h1 th:text="${todoForm != null and todoForm.id != null} ? #{action.edit} : #{action.new}">新規登録</h1>
          <div class="sub" th:text="${todoForm != null and todoForm.id != null} ? 'Edit' : 'New Registration'">New Registration</div>
        </div>
      </div>
      <div class="auth" sec:authorize="isAuthenticated()">
        <span>ログイン中: <strong sec:authentication="name">user</strong></span>
        <form th:action="@{/logout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" th:text="#{action.logout}">ログアウト</button>
        </form>
      </div>
    </div>

    <div class="card">
      <form th:action="@{/confirm}" th:object="${todoForm}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{id}" />
        <table>
          <tr>
            <th>
              <span th:text="#{label.author}">登録者</span>
              <span class="required">Required</span>
            </th>
            <td>
              <input type="text" th:field="*{author}" />
              <div th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
            </td>
          </tr>
          <tr>
            <th>
              <span th:text="#{label.assignee}">担当者</span>
            </th>
            <td>
              <input type="text" th:field="*{assignee}" />
            </td>
          </tr>
          <tr>
            <th>
              <span th:text="#{label.title}">タイトル</span>
              <span class="required">Required</span>
            </th>
            <td>
              <input type="text" th:field="*{title}" />
              <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </td>
          </tr>
          <tr>
            <th>
              <span th:text="#{label.detail}">詳細</span>
              <span class="required">Required</span>
            </th>
            <td>
              <textarea th:field="*{detail}"></textarea>
              <div th:if="${#fields.hasErrors('detail')}" th:errors="*{detail}"></div>
            </td>
          </tr>
          <tr>
            <th th:text="#{label.priority}">優先度</th>
            <td>
              <select th:field="*{priority}">
                <option th:each="p : ${T(com.example.todo.entity.Priority).values()}"
                        th:value="${p}"
                        th:selected="${p} == *{priority}"
                        th:text="${#messages.msg('priority.' + p.name())}">中</option>
              </select>
            </td>
          </tr>
          <tr>
            <th th:text="#{label.status}">状態</th>
            <td>
              <select th:field="*{status}">
                <option th:each="s : ${T(com.example.todo.entity.Status).values()}"
                        th:value="${s}"
                        th:selected="${s} == *{status}"
                        th:text="${#messages.msg('status.' + s.name())}">未着手</option>
              </select>
            </td>
          </tr>
          <tr>
            <th th:text="#{label.category}">カテゴリ</th>
            <td>
              <select th:field="*{categoryId}">
                <option value="" th:text="#{label.unselected}">未選択</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:selected="${c.id} == *{categoryId}"
                        th:text="${c.name}">カテゴリ</option>
              </select>
            </td>
          </tr>
          <tr>
            <th th:text="#{label.start}">開始</th>
            <td>
              <input type="date" th:field="*{startDate}" />
            </td>
          </tr>
          <tr>
            <th th:text="#{label.deadline}">期限</th>
            <td>
              <input type="date" th:field="*{deadline}" />
            </td>
          </tr>
        </table>

        <div class="actions">
          <button type="submit" class="action-button action-primary" th:text="#{action.confirm}">確認</button>
          <button type="button" class="action-button" onclick="history.back()">戻る</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
