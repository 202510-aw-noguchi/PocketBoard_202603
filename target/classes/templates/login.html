<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="#{app.loginTitle}">Login</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 520px; margin: 0 auto; }
    .header {
      position: relative;
      padding: 20px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    label { font-size: 13px; color: var(--muted); }
    input[type="text"], input[type="password"] {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      width: 100%;
      background: #fff;
    }
    button {
      margin-top: 6px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 8px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    .message {
      padding: 8px 10px;
      border-radius: 5px;
      font-size: 13px;
      border: 1px solid var(--border);
    }
    .message.error { background: #ffe5e5; border-color: #f0b4b4; }
    .message.info { background: #eef2ff; border-color: #c7d2fe; }
    .forgot-password-note {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .forgot-password-note a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1 th:text="#{app.loginTitle}">Login</h1>
      <div class="sub">Authentication</div>
    </div>

    <div class="card">
      <div class="message error" th:if="${param.error}" th:text="#{message.loginError}">
        Login failed.
      </div>
      <div class="message info" th:if="${param.logout}" th:text="#{message.logout}">
        Logged out.
      </div>
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label>
          <span th:text="#{label.username}">Username</span>
          <input type="text" name="username" autocomplete="username" required />
        </label>
        <label>
          <span th:text="#{label.password}">Password</span>
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <button type="submit" th:text="#{action.login}">Login</button>
      </form>
    </div>
    <p class="forgot-password-note">
      <a th:href="@{/password/reissue}" th:text="#{message.forgotPasswordInfo}">パスワード再発行はこちら</a>
    </p>
  </div>
</body>
</html>
