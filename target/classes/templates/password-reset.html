<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>パスワード再設定</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --danger: #ef4444;
      --success: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }
    .page { max-width: 520px; margin: 0 auto; }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }
    h1 { margin: 0; font-size: 24px; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 13px; }
    .card {
      margin-top: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    form { display: flex; flex-direction: column; gap: 10px; }
    label { font-size: 13px; color: var(--muted); }
    input[type="password"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 9px 10px;
      background: #fff;
    }
    button {
      margin-top: 4px;
      border: none;
      border-radius: 5px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .alert {
      margin-bottom: 10px;
      padding: 9px 10px;
      border-radius: 5px;
      font-size: 13px;
    }
    .alert.error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #b91c1c;
    }
    .alert.success {
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #0f766e;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>パスワード再設定</h1>
      <div class="sub">セキュリティのため、新しいパスワードを設定してください。</div>
    </div>
    <div class="card">
      <div class="alert error" th:if="${error}" th:text="${error}">エラー</div>
      <div class="alert success" th:if="${message}" th:text="${message}">完了</div>
      <form th:action="@{/password/reset}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label>
          対象ユーザー
          <div th:text="${username}">user</div>
        </label>
        <label>
          新しいパスワード
          <input type="password" name="newPassword" autocomplete="new-password" required />
        </label>
        <label>
          新しいパスワード（確認）
          <input type="password" name="confirmPassword" autocomplete="new-password" required />
        </label>
        <button type="submit">パスワードを更新</button>
      </form>
    </div>
  </div>
</body>
</html>
